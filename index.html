<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新加坡雙人行程 2026/07/04 - 2026/07/12</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <h1>新加坡雙人行程網站</h1>
    <p>2026/07/04 抵達樟宜 - 2026/07/12 下午 3 點前抵達樟宜離境</p>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="每日行程導覽">
      <h2>每日行程導覽</h2>
      <nav id="day-nav" class="day-nav"></nav>
      <h2>每日總覽時間表（一次看全部）</h2>
      <div id="all-days-overview" class="all-days-overview"></div>
    </aside>

    <section class="content">
      <article class="panel">
        <h2>行程總覽</h2>
        <div id="trip-overview"></div>
      </article>

      <article class="panel">
        <h2>景點規劃重點（先定景點）</h2>
        <div id="attraction-plan"></div>
      </article>

      <article class="panel">
        <h2>天氣與準備建議</h2>
        <div id="weather-summary"></div>
      </article>

      <article class="panel">
        <h2>住宿定案</h2>
        <div id="hotel-fixed"></div>
      </article>

      <article class="panel">
        <h2>比價檢查（你目前訂單）</h2>
        <div id="price-check"></div>
      </article>

      <article class="panel">
        <h2>付款方式最省策略</h2>
        <div id="payment-strategy"></div>
      </article>

      <article class="panel">
        <h2>雙人總預算儀表板</h2>
        <div id="budget-dashboard"></div>
      </article>

      <article class="panel">
        <h2>景點 / 餐廳預約清單</h2>
        <div id="reservation-plan"></div>
      </article>

      <article class="panel">
        <h2>交通與票價通則</h2>
        <div id="transport-notes"></div>
      </article>

      <article class="panel">
        <h2>每日捷運動線視覺化</h2>
        <p id="mrt-summary"></p>
        <div id="mrt-visual" class="mrt-visual"></div>
      </article>

      <article class="panel">
        <h2 id="day-map-title">每日互動地圖</h2>
        <p id="day-map-summary"></p>
        <div id="day-map-areas" class="mrt-visual"></div>
        <p><a id="day-map-route-link" href="#" target="_blank" rel="noopener noreferrer">開啟 Google Maps 路線（可導航）</a></p>
        <iframe
          id="day-map-frame"
          class="day-map-frame"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src=""
          title="每日景點地圖"
        ></iframe>
      </article>

      <article class="panel">
        <h2 id="day-title">每日詳細安排</h2>
        <p id="day-summary"></p>
        <div id="blocks" class="blocks"></div>
      </article>
    </section>
  </main>

  <footer class="page-footer">
    <p>註：交通、餐費與門票均為估算值，實際以當日價格與路況為準。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
