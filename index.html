<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新加坡雙人行程 2026/07/04 - 2026/07/12</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="page-header">
    <h1>新加坡雙人行程網站</h1>
    <p>2026/07/04 抵達樟宜 - 2026/07/12 下午 3 點前抵達樟宜離境</p>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="網站導覽">
      <h2>每日行程</h2>
      <p class="sidebar-hint">單日僅在主畫面顯示「快速跳轉」卡片；行前總表與完整時間軸請按「一次看完」。</p>
      <nav id="day-nav" class="day-nav" aria-label="依日期檢視"></nav>
    </aside>

    <section class="content">
      <div id="view-daily" class="content-view is-active">
        <!-- 僅「一次看完」：單一總表 + 全境地圖 -->
        <div id="full-trip-static" class="full-trip-static" hidden>
          <article class="panel panel-trip-info">
            <h2>行前資訊總表</h2>
            <p class="meta">以下區塊合併為同一表單，僅在此檢視。</p>
            <div id="trip-info-form" class="trip-info-form"></div>
          </article>
          <article class="panel panel-map-overview">
            <h2>全行程景點地圖</h2>
            <p id="overview-map-summary" class="meta"></p>
            <div id="overview-map-areas" class="mrt-visual"></div>
            <p><a id="overview-map-route-link" href="#" target="_blank" rel="noopener noreferrer">開啟 Google Maps 全行程多站路線</a></p>
            <iframe
              id="overview-map-frame"
              class="day-map-frame"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src=""
              title="全行程景點地圖"
            ></iframe>
          </article>
        </div>

        <!-- 單日：僅快速跳轉卡片 -->
        <div id="main-quick-overview" class="panel main-quick-overview">
          <h2>快速跳轉</h2>
          <p class="meta">選擇側欄日期後，此處會標示當日卡片；細節請用「一次看完」。</p>
          <div id="all-days-overview" class="all-days-overview"></div>
        </div>

        <!-- 僅「一次看完」：全行程捷運 + 時間軸 -->
        <div id="full-trip-timeline-block" class="full-trip-timeline-block" hidden>
          <article id="panel-daily-mrt" class="panel">
            <h2>全行程捷運動線（去重）</h2>
            <p id="mrt-summary"></p>
            <div id="mrt-visual" class="mrt-visual"></div>
          </article>
          <article class="panel panel-daily">
            <h2 id="day-title">每日時間軸</h2>
            <p id="day-summary"></p>
            <div id="blocks" class="blocks"></div>
            <div class="timeline-legend" id="timeline-legend" aria-hidden="true">
              <span class="leg-item"><span class="leg-dot dot-main"></span>景點／活動</span>
              <span class="leg-item"><span class="leg-dot dot-food"></span>餐飲</span>
              <span class="leg-item"><span class="leg-dot dot-conf"></span>研討會</span>
              <span class="leg-item"><span class="leg-dot dot-alert"></span>重要／交通</span>
              <span class="leg-item"><span class="leg-dot dot-gray"></span>其他</span>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <p>註：交通、餐費與門票均為估算值，實際以當日價格與路況為準。</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
